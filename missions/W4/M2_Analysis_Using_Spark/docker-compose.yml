services:

  spark-master:
    build: .
    container_name: spark-master
    hostname: spark-master
    command: >
      bash -c "start-master.sh --host spark-master --port 7077 --webui-port 8080
      && tail -f /opt/spark/logs/*.out"
    ports:
      - "8080:8080"
    volumes:
      - ./apps:/opt/spark-apps
      - ../../data:/opt/spark-data
    networks:
      - spark-net

  spark-worker-1:
    build: .
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    command: >
      bash -c "start-worker.sh spark://spark-master:7077 --webui-port 8081
      && tail -f /opt/spark/logs/*.out"
    ports:
      - "8081:8081"
    volumes:
      - ./apps:/opt/spark-apps
      - ../../data:/opt/spark-data
    networks:
      - spark-net
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g

  spark-worker-2:
    build: .
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    command: >
      bash -c "start-worker.sh spark://spark-master:7077 --webui-port 8082
      && tail -f /opt/spark/logs/*.out"
    ports:
      - "8082:8082"
    volumes:
      - ./apps:/opt/spark-apps
      - ../../data:/opt/spark-data
    networks:
      - spark-net
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g

  jupyter:
    build: .
    container_name: jupyter
    hostname: jupyter
    depends_on:
      - spark-master
    command: >
      bash -c "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token='' --notebook-dir=/opt/notebooks"
    ports:
      - "8888:8888"
    volumes:
      - ./apps:/opt/spark-apps
      - ./notebooks:/opt/notebooks
      - ../../data:/opt/spark-data
    networks:
      - spark-net
    environment:
      - PYTHONPATH=/opt/spark-apps

networks:
  spark-net:
    driver: bridge
